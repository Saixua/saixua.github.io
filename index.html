<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saixua | Project Hub</title>
    <style>
        body {
            background-color: #0d0e12;
            color: #d1d5db;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px 20px;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #171923;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
            display: block;
        }
        .card:hover {
            border-color: #38bdf8;
            transform: translateY(-4px);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.15);
        }
        .card h3 {
            color: #f3f4f6;
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }
        .card p {
            margin: 0;
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SAIXUA.SYS</h1>
        <p class="subtitle">Select a project node to initialize protocol execution:</p>

        <div class="grid">
            <!-- ISLA TERMINAL NODE -->
            <a href="https://github.io" class="card">
                <h3>[ Isla Terminal ]</h3>
                <p>Secure transceiver firmware interface. Decoder module v1.5.</p>
            </a>

            <!-- POKER GAME NODE -->
            <a href="https://github.io" class="card">
                <h3>[ Poker Game ]</h3>
                <p>Local tactical card simulation engine and state system.</p>
            </a>
            
            <!-- FUTURE PROJECTS GO HERE -->
        </div>
    </div>

</body>
</html>
